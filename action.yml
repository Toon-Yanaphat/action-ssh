name: "GH-Remote-Action"
description: "Run commands on a remote server over SSH"
inputs:
  host:
    description: "Remote host"
    required: true
  username:
    description: "SSH username"
    required: true
  key:
    description: "SSH private key"
    required: true
  port:
    description: "SSH port"
    required: false
    default: "22"
  timeout:
    description: "Connection timeout (in seconds)"
    required: false
    default: "30"
  envs:
    description: "Environment variables to pass to the remote script"
    required: false
  script:
    description: "Commands to run"
    required: true
runs:
  using: "docker"
  image: "dockerfile"
  args:
    - ${{ inputs.host }}
    - ${{ inputs.username }}
    - ${{ inputs.key }}
    - ${{ inputs.port }}
    - ${{ inputs.timeout }}
    - ${{ inputs.envs }}
    - ${{ inputs.script }}